; ============================================================
;  LoRa Ping-Pong link test  (Seeed XIAO ESP32-C3 + E32-433T30S)
;  Two identical units exchange PING/PONG packets and each hosts
;  a WiFi-AP web portal showing both units' link status.
;  Flash unitA to one board, unitB to the other.
; ============================================================
[env]
platform      = espressif32@6.9.0     ; Arduino-ESP32 core 2.0.x
board         = seeed_xiao_esp32c3
framework     = arduino
monitor_speed = 115200
build_flags =
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=0

[env:unitA]
build_flags = ${env.build_flags} -DPINGPONG_ID=1

[env:unitB]
build_flags = ${env.build_flags} -DPINGPONG_ID=2
