; PlatformIO Project Configuration File
; PAMIANG High-Power LoRa Weather Station (E32-433T30S)
;

; -- TX Board (sensor reader + LoRa sender, fire-and-forget) --
[env:seeed_xiao_esp32c3]
platform = espressif32@6.9.0   ; Arduino-ESP32 core 2.0.x — project targets the 2.x WDT/ESP-NOW APIs
board = seeed_xiao_esp32c3
framework = arduino
board_build.f_cpu = 80000000L
board_build.partitions = partitions_ota_4mb.csv
monitor_speed = 115200
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_MODE=1
    -DCONFIG_BT_NIMBLE_ENABLED=1
lib_deps =
    4-20ma/ModbusMaster@^2.0.1
    h2zero/NimBLE-Arduino@^1.4.2
build_src_filter =
    +<*>
    -<sensor_v2_average.cpp>
    -<GsmHandler.cpp>
    -<main_ACK.cpp>
    -<main_ACK_Dummy.cpp>
    -<main_rx.cpp>
    -<LoRaReceiver.cpp>
    -<MqttPublisher.cpp>
    -<RxUtils.cpp>
    -<test_e32_tx.cpp>
    -<test_e32_rx.cpp>

; -- TX Board with ACK protocol (send -> wait ACK -> retry) --
[env:seeed_xiao_esp32c3_ack]
platform = espressif32@6.9.0   ; Arduino-ESP32 core 2.0.x — project targets the 2.x WDT/ESP-NOW APIs
board = seeed_xiao_esp32c3
framework = arduino
board_build.f_cpu = 80000000L
board_build.partitions = partitions_ota_4mb.csv
monitor_speed = 115200
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_MODE=1
    -DCONFIG_BT_NIMBLE_ENABLED=1
    -DLORA_USE_ACK
lib_deps =
    4-20ma/ModbusMaster@^2.0.1
    h2zero/NimBLE-Arduino@^1.4.2
build_src_filter =
    +<*>
    -<sensor_v2_average.cpp>
    -<GsmHandler.cpp>
    -<main.cpp>
    -<main_ACK_Dummy.cpp>
    -<main_rx.cpp>
    -<LoRaReceiver.cpp>
    -<MqttPublisher.cpp>
    -<RxUtils.cpp>
    -<test_e32_tx.cpp>
    -<test_e32_rx.cpp>

; -- TX Board with ACK protocol + average post-processing --
[env:seeed_xiao_esp32c3_ack_average]
extends = env:seeed_xiao_esp32c3_ack
build_src_filter =
    +<*>
    -<GsmHandler.cpp>
    -<main.cpp>
    -<main_ACK_Dummy.cpp>
    -<main_rx.cpp>
    -<LoRaReceiver.cpp>
    -<MqttPublisher.cpp>
    -<RxUtils.cpp>
    -<test_e32_tx.cpp>
    -<test_e32_rx.cpp>
    -<sensor_v2.cpp>
    +<sensor_v2_average.cpp>

; -- RX Board (LoRa receiver + BLE relay to LILYGO SIM800L) --
[env:rx_gateway]
platform = espressif32@6.9.0   ; Arduino-ESP32 core 2.0.x — project targets the 2.x WDT/ESP-NOW APIs
board = seeed_xiao_esp32c3
framework = arduino
board_build.f_cpu = 80000000L
board_build.partitions = partitions_ota_4mb.csv
monitor_speed = 115200
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_MODE=1
lib_deps =
    4-20ma/ModbusMaster@^2.0.1
    vshymanskyy/TinyGSM@^0.12.0
    knolleary/PubSubClient@^2.8
    h2zero/NimBLE-Arduino@^1.4.2
build_src_filter =
    +<*>
    -<sensor_v2_average.cpp>
    -<main.cpp>
    -<main_ACK.cpp>
    -<main_ACK_Dummy.cpp>
    -<sensor_v2.cpp>
    -<WifiApServer.cpp>
    -<BleHandler.cpp>
    -<LoRaPublisher.cpp>
    -<TxUtilities.cpp>

; -- TX Board ACK dummy range test (LoRa only, no BLE/WiFi AP/WebServer) --
[env:seeed_xiao_esp32c3_ack_dummy]
platform = espressif32@6.9.0   ; Arduino-ESP32 core 2.0.x — project targets the 2.x WDT/ESP-NOW APIs
board = seeed_xiao_esp32c3
framework = arduino
board_build.f_cpu = 80000000L
board_build.partitions = partitions_ota_4mb.csv
monitor_speed = 115200
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_MODE=1
    -DLORA_USE_ACK
lib_deps =
    4-20ma/ModbusMaster@^2.0.1
build_src_filter =
    -<*>
    +<main_ACK_Dummy.cpp>
    +<LoRaE32Handler.cpp>
