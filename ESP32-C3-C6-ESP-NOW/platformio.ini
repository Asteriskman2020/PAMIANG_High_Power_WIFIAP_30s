; ============================================================
;  ESP-NOW Ping-Pong link test
;  Unit 1 = ESP32-C3 SuperMini   Unit 2 = ESP32-C6 SuperMini
;  Same firmware, different board + PINGPONG_ID per env.
;  Both run a WiFi-AP web portal (http://192.168.4.1) showing
;  both units' status. ESP-NOW needs a shared channel, so both
;  fix their SoftAP to ESPNOW_CHANNEL (1).
;  NOTE: ESP32-C6 needs Arduino-ESP32 core 3.x — do NOT pin 2.x.
; ============================================================
[env]
platform      = espressif32
framework     = arduino
monitor_speed = 115200
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=0

[env:c3_supermini]
board       = esp32-c3-devkitm-1
build_flags = ${env.build_flags} -DPINGPONG_ID=1 -DUNIT_LABEL='"C3"'

[env:c6_supermini]
board       = esp32-c6-devkitm-1
build_flags = ${env.build_flags} -DPINGPONG_ID=2 -DUNIT_LABEL='"C6"'
